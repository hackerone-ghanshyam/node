name: Node CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: production
      API_URL: ${{ secrets.API_URL }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'   # 👈 yaha tum apna version fix kar rahe ho
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 Debug env (safe)
        run: |
          echo "NODE_ENV=$NODE_ENV"
          echo "API_URL is set"
        # ❌ kabhi bhi secrets directly print mat karna

      - name: 🧪 Run tests
        run: npm test

      - name: 🏗️ Build project
        run: npm run build

      - name: 🚀 Deploy (example)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying app..."
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
